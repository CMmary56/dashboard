<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Mi Banco</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
  <style>
    /* Dashboard UX/UI Improvements */
    .fade-in-up {
      animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }

    @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    .pulse-dot { animation: pulse 2s infinite; }

    .card-saldo-fx {
      background: linear-gradient(145deg, #ffffff 0%, #f9fbfc 100%);
      border: 1px solid rgba(0,0,0,0.04);
      border-left: 5px solid var(--color-secundario);
      box-shadow: 0 6px 16px rgba(0,0,0,0.04);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
      border-radius: 16px;
    }
    .card-saldo-fx.ahorro { border-left-color: #198754; }
    .card-saldo-fx::before {
      content: ''; position: absolute; top:-20px; right:-20px; width:120px; height:120px;
      background: radial-gradient(circle, rgba(46, 117, 182, 0.08) 0%, transparent 70%);
      border-radius: 50%; transition: all 0.4s ease;
    }
    .card-saldo-fx.ahorro::before {
      background: radial-gradient(circle, rgba(25, 135, 84, 0.08) 0%, transparent 70%);
    }
    .card-saldo-fx:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.08);
    }
    .card-saldo-fx:hover::before { transform: scale(1.3); }

    .acceso-fx {
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
      border-radius: 14px;
    }
    .acceso-fx::after {
      content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.5) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg); transition: all 0.5s ease;
    }
    .acceso-fx:hover::after { left: 200%; }
    .acceso-fx:hover {
      background-color: var(--color-primario);
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(26,58,107,0.2) !important;
    }
    .acceso-fx:hover span {
      color: white !important;
    }

    /* Skeleton Loader */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e6e6e6 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: skeletonLoading 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes skeletonLoading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-text { height: 16px; margin-bottom: 8px; width: 100%; }
    .skeleton-avatar { width: 42px; height: 42px; border-radius: 50%; flex-shrink:0; }

    .txn-row { transition: all 0.25s ease; border-bottom: 1px solid #f1f3f5; cursor: default; }
    .txn-row:last-child { border-bottom: none; }
    .txn-row:hover {
      background-color: #f8faff;
      transform: translateX(4px);
    }
  </style>
</head>
<body>

<!-- Toast Global -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="appToast" class="toast align-items-center text-white bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastBody">OK</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Spinner Global -->
<div id="loadingSpinner" class="d-none">
  <div class="text-center">
    <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
    <p class="mt-2 text-muted fw-medium">Cargando...</p>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-banco">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
      <i class="bi bi-bank fs-4 me-2"></i>MI BANCO
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-center gap-3">
        <li class="nav-item">
          <div class="d-flex align-items-center gap-2 bg-black bg-opacity-10 px-3 py-1 rounded-pill">
            <i class="bi bi-person-circle fs-5" style="color:var(--color-acento)"></i>
            <span id="userName" style="color:var(--color-acento);font-weight:600">...</span>
          </div>
        </li>
        <li class="nav-item">
          <button class="btn btn-sm btn-outline-light rounded-pill px-3" id="btnLogout">
            <i class="bi bi-box-arrow-right me-1"></i>Cerrar sesión
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Layout -->
<div class="portal-layout">

  <!-- Sidebar -->
  <nav class="sidebar d-none d-lg-block">
    <ul class="nav flex-column mt-2">
      <li><a class="nav-link active" href="dashboard.html"><i class="bi bi-grid-1x2"></i> Dashboard</a></li>
      <li><a class="nav-link" href="transacciones.html"><i class="bi bi-arrow-left-right"></i> Transacciones</a></li>
      <li><a class="nav-link" href="pagos.html"><i class="bi bi-credit-card"></i> Pagos</a></li>
      <li><a class="nav-link" href="prestamos.html"><i class="bi bi-cash-stack"></i> Préstamos</a></li>
      <li><a class="nav-link" href="ahorro.html"><i class="bi bi-piggy-bank"></i> Ahorro</a></li>
    </ul>
  </nav>

  <!-- Contenido principal -->
  <main class="main-content" style="background-color: #f7f9fc; min-height: 100vh;">

    <!-- Saludo -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 fade-in-up">
      <div class="mb-2 mb-md-0">
        <h4 class="mb-1 fw-bold text-dark">Bienvenido, <span id="welcomeName" class="text-primary">...</span></h4>
        <p class="text-muted small mb-0 d-flex align-items-center gap-2">
          <i class="bi bi-calendar3"></i> <span id="fechaHoy"></span>
        </p>
      </div>
      <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 px-3 py-2 rounded-pill shadow-sm d-flex align-items-center gap-2">
        <i class="bi bi-circle-fill pulse-dot" style="font-size:8px;"></i>
        <span class="fw-semibold">En línea</span>
      </span>
    </div>

    <!-- Tarjetas de saldo -->
    <div class="row g-4 mb-5" id="cuentasContainer">
      <!-- Skeletons por defecto mientras carga -->
      <div class="col-12 col-md-6 col-xl-4 mb-2">
        <div class="card card-saldo p-3 skeleton border-0" style="height:130px;"></div>
      </div>
      <div class="col-12 col-md-6 col-xl-4 mb-2">
        <div class="card card-saldo p-3 skeleton border-0" style="height:130px;"></div>
      </div>
    </div>

    <!-- Accesos rápidos -->
    <div class="d-flex align-items-center gap-3 mb-4 fade-in-up delay-1">
      <h6 class="fw-bold text-secondary text-uppercase mb-0" style="font-size:0.85rem;letter-spacing:1px">
        Accesos Rápidos
      </h6>
      <hr class="flex-grow-1 opacity-25 m-0">
    </div>
    <div class="row g-3 mb-5 fade-in-up delay-1">
      <div class="col-6 col-md-4 col-lg-2">
        <a href="transacciones.html" class="acceso-rapido acceso-fx border-0 shadow-sm d-flex flex-column align-items-center justify-content-center pt-3 pb-3">
          <i class="bi bi-arrow-left-right mb-2 fs-3 text-secondary"></i>
          <span class="fw-medium text-dark">Transacciones</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <a href="pagos.html" class="acceso-rapido acceso-fx border-0 shadow-sm d-flex flex-column align-items-center justify-content-center pt-3 pb-3">
          <i class="bi bi-credit-card-2-front mb-2 fs-3 text-secondary"></i>
          <span class="fw-medium text-dark">Pagos</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <a href="prestamos.html" class="acceso-rapido acceso-fx border-0 shadow-sm d-flex flex-column align-items-center justify-content-center pt-3 pb-3">
          <i class="bi bi-cash-stack mb-2 fs-3 text-secondary"></i>
          <span class="fw-medium text-dark">Préstamos</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <a href="ahorro.html" class="acceso-rapido acceso-fx border-0 shadow-sm d-flex flex-column align-items-center justify-content-center pt-3 pb-3">
          <i class="bi bi-piggy-bank mb-2 fs-3 text-secondary"></i>
          <span class="fw-medium text-dark">Ahorro</span>
        </a>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <a href="#" class="acceso-rapido acceso-fx border-0 shadow-sm d-flex flex-column align-items-center justify-content-center pt-3 pb-3">
          <i class="bi bi-qr-code-scan mb-2 fs-3 text-secondary"></i>
          <span class="fw-medium text-dark">QR Pago</span>
        </a>
      </div>
    </div>

    <!-- Últimas transacciones -->
    <div class="card border-0 shadow-sm rounded-4 fade-in-up delay-2 overflow-hidden">
      <div class="card-header bg-white d-flex justify-content-between align-items-center border-0 p-4 pb-3">
        <h6 class="mb-0 fw-bold fs-5 text-dark d-flex align-items-center gap-2">
          <i class="bi bi-clock-history text-primary"></i> Últimos movimientos
        </h6>
        <a href="transacciones.html" class="btn btn-sm btn-light border text-primary fw-semibold rounded-pill px-3 shadow-sm hover-elevate">Ver todos</a>
      </div>
      <div class="card-body p-0">
        <div id="txnRecientes" class="px-3 pb-3">
          <!-- Skeletons de tabla por defecto -->
          <div class="d-flex p-3 gap-3">
            <div class="skeleton skeleton-avatar"></div>
            <div class="flex-grow-1">
              <div class="skeleton skeleton-text" style="width: 40%"></div>
              <div class="skeleton skeleton-text" style="width: 20%"></div>
            </div>
          </div>
          <div class="d-flex p-3 gap-3">
            <div class="skeleton skeleton-avatar"></div>
            <div class="flex-grow-1">
              <div class="skeleton skeleton-text" style="width: 40%"></div>
              <div class="skeleton skeleton-text" style="width: 20%"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="../js/modulos/dashboard.js"></script>
</body>
</html>
